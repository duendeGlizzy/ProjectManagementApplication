<div *ngIf="authService.isLoggedIn(); else loggedOut" class="app-wrapper">

  <mat-toolbar color="primary" class="main-header shadow-sm">
    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span style="font-weight: 500; margin-left: 8px;">JobTracker Enterprise</span>

    <span class="toolbar-spacer"></span>

    <div class="user-action-capsule" *ngIf="employee">

      <button mat-button
              routerLink="/employee-details"
              class="profile-toolbar-btn"
              title="View Account Details">
        <mat-icon class="btn-avatar-icon">account_circle</mat-icon>
        <span class="employee-name-text">{{ employee.firstName }} {{ employee.lastName }}</span>
      </button>

      <div class="capsule-divider"></div>

      <button mat-icon-button
              (click)="onLogout()"
              class="logout-toolbar-btn"
              title="Log Out">
        <mat-icon class="btn-logout-icon">logout</mat-icon>
      </button>

    </div>

  </mat-toolbar>

  <mat-sidenav-container class="app-container">
    <mat-sidenav #sidenav mode="side" opened class="app-sidenav">
      <mat-nav-list class="navigation-links">

        <div class="nav-section-title">Operations</div>
        <a mat-list-item routerLink="/jobs" routerLinkActive="active-link" (click)="sidenav.mode === 'over' && sidenav.close()">
          <mat-icon matListItemIcon color="primary">dashboard</mat-icon>
          <span matListItemTitle>Job Dashboard</span>
        </a>

        <a mat-list-item routerLink="/contractors" routerLinkActive="active-link" (click)="sidenav.mode === 'over' && sidenav.close()">
          <mat-icon matListItemIcon color="accent">engineering</mat-icon>
          <span matListItemTitle>Contractor Ledger</span>
        </a>

        <div class="nav-section-title">Accounts</div>
        <a mat-list-item routerLink="/financials" routerLinkActive="active-link" (click)="sidenav.mode === 'over' && sidenav.close()">
          <mat-icon matListItemIcon style="color: #2e7d32;">payments</mat-icon>
          <span matListItemTitle>Financial Dashboard</span>
        </a>

        <a mat-list-item routerLink="/clients" routerLinkActive="active-link" (click)="sidenav.mode === 'over' && sidenav.close()">
          <mat-icon matListItemIcon style="color: #7b1fa2;">groups</mat-icon>
          <span matListItemTitle>Client Profiles</span>
        </a>

        <div class="nav-section-title">Util</div>
        <a mat-list-item routerLink="/email" routerLinkActive="active-link" (click)="sidenav.mode === 'over' && sidenav.close()">
          <mat-icon matListItemIcon style="color: cornflowerblue;">email</mat-icon>
          <span matListItemTitle>Email</span>
        </a>

        <a mat-list-item routerLink="/file-browser" routerLinkActive="active-link" (click)="sidenav.mode === 'over' && sidenav.close()">
          <mat-icon matListItemIcon style="color: gold;">folder</mat-icon>
          <span matListItemTitle>Files</span>
        </a>

      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="main-content-pane">
      <div class="page-container">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>

</div>

<ng-template #loggedOut>
  <div class="auth-fullscreen-wrapper">
    <router-outlet></router-outlet>
  </div>
</ng-template>
