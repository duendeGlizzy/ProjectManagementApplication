
<h1>admin login</h1>
<form (ngSubmit)="onSubmit()">
  <input [(ngModel)]="credentials.email" name="email" placeholder="Email" type="email">
  <input [(ngModel)]="credentials.password" name="password" placeholder="Password" type="password">
  <button type="submit">Log In</button>
</form>
<button routerLink="/">back</button>
