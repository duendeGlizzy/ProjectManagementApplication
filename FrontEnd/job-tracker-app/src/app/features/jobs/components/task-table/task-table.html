<h3 style="color: #555; border-bottom: 1px solid #e0e0e0; padding-bottom: 6px; font-weight: 500;">Tasks</h3>

<div>
  <button matButton="tonal" [routerLink]="['/tasks/new']" [queryParams]="{ jobId: jobId }">New task</button>
</div>
<div class="mat-elevation-z8 text-nowrap rounded overflow-hidden" *ngIf="taskList().length > 0"
     style="margin-bottom: 5px; max-height:350px; overflow-y:auto; overflow-x: auto;">
  <table mat-table [dataSource]="taskList()" class="w-100">

    <ng-container matColumnDef="taskId">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let task"> <strong>#{{ task.taskId }}</strong> </td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef> Description </th>
      <td mat-cell *matCellDef="let task"> {{ task.description }} </td>
    </ng-container>

    <ng-container matColumnDef="totalPrice">
      <th mat-header-cell *matHeaderCellDef> Total Price </th>
      <td mat-cell *matCellDef="let task"> {{ task.totalPrice | currency }} </td>
    </ng-container>

    <ng-container matColumnDef="isSubContracted">
      <th mat-header-cell *matHeaderCellDef> Sub Contract? </th>
      <td mat-cell *matCellDef="let task"> {{ task.isSubContracted}} </td>
    </ng-container>



    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let task">
          <span class="badge"
                [ngClass]="{
                  'bg-warning text-dark': task.status === 'IN_QUEUE',
                  'bg-info text-white': task.status === 'STARTED' || task.status === 'IN_PROGRESS',
                  'bg-success text-white': task.status === 'COMPLETED'
                }">
            {{ task.status }}
          </span>
      </td>
    </ng-container>




    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"
        [routerLink]="['/tasks', row.taskId]"
        [queryParams]="{ jobId: jobId }"
        style="cursor: pointer;"
        class="clickable-row">
    </tr>
  </table>
</div>
