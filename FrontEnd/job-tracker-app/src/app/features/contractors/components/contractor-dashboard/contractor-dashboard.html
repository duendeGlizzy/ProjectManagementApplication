<div class="dashboard-container">

  <header class="dashboard-header">
    <div class="header-title-group">
      <h1>Contractor Management Dashboard</h1>
      <p class="subtitle">Monitor, track, and manage workspace profiles, sub-contractors, and vendor accounts.</p>
    </div>
  </header>

  <div *ngIf="isLoading" class="spinner-container">
    <mat-spinner diameter="45"></mat-spinner>
    <span class="spinner-text">Assembling tables and layout structures...</span>
  </div>

  <div *ngIf="!isLoading && errorMessage" class="error-banner">
    <mat-icon class="error-icon">error_outline</mat-icon>
    <div class="error-content">
      <span class="error-title">Data Retrieval Exception</span>
      <p class="error-message">{{ errorMessage }}</p>
    </div>
  </div>

  <main *ngIf="!isLoading && !errorMessage" class="dashboard-content">

    <section class="table-card shadow-sm">
      <app-sub-contractor-table
        [data]="subContractors()"
        (refreshRequested)="loadAllDashboardData()">
      </app-sub-contractor-table>
    </section>

    <section class="table-card shadow-sm">
      <app-prime-contractor-table
        [data]="primeContractors()"
        (refreshRequested)="loadAllDashboardData()">
      </app-prime-contractor-table>
    </section>

    <section class="table-card shadow-sm">
      <app-vendor-table
        [data]="vendors()"
        (refreshRequested)="loadAllDashboardData()">
      </app-vendor-table>
    </section>

  </main>
</div>
