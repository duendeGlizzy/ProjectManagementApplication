<div class="container-wrapper" style="max-width: 1200px; margin: 2rem auto; padding: 0 1rem;">
  <h2>Contractor Dashboard</h2>

  <div *ngIf="isLoading" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 300px; gap: 16px;">
    <mat-spinner diameter="50"></mat-spinner>
    <span style="color: #666; font-size: 0.95rem; font-weight: 500; letter-spacing: 0.3px;">Assembling tables...</span>
  </div>

  <div *ngIf="!isLoading && errorMessage" style="background-color: #ffebee; color: #c62828; padding: 16px; margin-bottom: 20px; border-left: 4px solid #e53935;">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && !errorMessage" style="display: flex; flex-direction: column; gap: 40px;">

    <app-sub-contractor-table
      [data]="subContractors()"
      (refreshRequested)="loadAllDashboardData()">
    </app-sub-contractor-table>

    <app-prime-contractor-table
      [data]="primeContractors()"
      (refreshRequested)="loadAllDashboardData()">
    </app-prime-contractor-table>

    <app-vendor-table
      [data]="vendors()"
      (refreshRequested)="loadAllDashboardData()">
    </app-vendor-table>

  </div>
</div>
