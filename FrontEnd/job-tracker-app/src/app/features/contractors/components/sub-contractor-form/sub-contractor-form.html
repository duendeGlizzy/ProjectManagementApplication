<div class="container-wrapper" style="max-width: 650px; margin: 2rem auto; padding: 0 1rem;">

  <mat-card style="border-radius: 0 !important; border: 1px solid #e0e0e0; box-shadow: none; padding: 12px;">

    <mat-card-header style="background-color: #3f51b5; color: white; padding: 16px; margin: -12px -12px 20px -12px;">
      <mat-card-title style="font-size: 1.2rem; font-weight: 500; display: flex; align-items: center; gap: 8px;">
        <mat-icon>{{ isEditMode ? 'edit' : 'add_circle_outline' }}</mat-icon>
        <span>{{ isEditMode ? 'Edit Sub Contractor Details' : 'Register New Sub Contractor' }}</span>
      </mat-card-title>
    </mat-card-header>

    <div *ngIf="errorMessage" style="background-color: #ffebee; color: #c62828; padding: 12px; margin-bottom: 20px; border-left: 4px solid #e53935; font-size: 0.95rem;">
      {{ errorMessage }}
    </div>

    <form [formGroup]="subContractorForm" (ngSubmit)="onSubmit()">
      <mat-card-content style="display: flex; flex-direction: column; gap: 16px;">

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Company Name</mat-label>
          <input matInput formControlName="companyName" placeholder="e.g. Acme Supply Co.">
          <mat-error *ngIf="subContractorForm.get('companyName')?.hasError('required')">
            Company Name is required.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Phone Number</mat-label>
          <input matInput formControlName="phoneNumber" placeholder="555-0199">
          <mat-error *ngIf="subContractorForm.get('phoneNumber')?.hasError('required')">
            Phone number entry is required.
          </mat-error>
          <mat-error *ngIf="subContractorForm.get('phoneNumber')?.hasError('pattern')">
            Please enter a valid phone number.
          </mat-error>
        </mat-form-field>

      </mat-card-content>

      <mat-card-actions align="end" style="padding: 16px 0 4px 0; gap: 8px; border-top: 1px solid #e0e0e0; margin-top: 20px;">
        <button mat-button type="button" routerLink="/contractors" [disabled]="isSubmitting" style="border-radius: 0 !important;">
          Cancel
        </button>
        <button mat-flat-button color="primary" type="submit" [disabled]="subContractorForm.invalid || isSubmitting" style="border-radius: 0 !important; font-weight: 500;">
          <mat-icon style="font-size: 18px; width: 18px; height: 18px; margin-right: 4px;">save</mat-icon>
          <span>{{ isEditMode ? 'Update Sub Contractor' : 'Save Sub Contractor' }}</span>
        </button>
      </mat-card-actions>
    </form>

  </mat-card>
</div>
