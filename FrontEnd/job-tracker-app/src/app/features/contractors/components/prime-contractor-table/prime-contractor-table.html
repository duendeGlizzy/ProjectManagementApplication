<div class="table-card shadow-sm">

  <div class="table-toolbar">
    <div class="table-title-group">
      <h3>Prime Contractor Accounts</h3>
      <span class="count-badge">{{ data().length }} Active</span>
    </div>
    <button mat-flat-button
            color="primary"
            routerLink="/contractors/primeContractor/new"
            class="action-btn">
      <mat-icon>add</mat-icon>
      <span>New Prime Contractor</span>
    </button>
  </div>

  <div class="table-container text-nowrap rounded" *ngIf="data().length > 0">
    <table mat-table [dataSource]="data()" class="w-100 custom-dashboard-table">

      <ng-container matColumnDef="primeContractorId">
        <th mat-header-cell *matHeaderCellDef class="col-id"> ID </th>
        <td mat-cell *matCellDef="let sb" class="col-id font-mono"> #{{ sb.primeContractorId }} </td>
      </ng-container>

      <ng-container matColumnDef="companyName">
        <th mat-header-cell *matHeaderCellDef> Company Name </th>
        <td mat-cell *matCellDef="let sb" class="font-medium"> {{ sb.companyName }} </td>
      </ng-container>

      <ng-container matColumnDef="phoneNumber">
        <th mat-header-cell *matHeaderCellDef> Phone Number </th>
        <td mat-cell *matCellDef="let sb"> {{ sb.phoneNumber }} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-center col-actions"> Actions </th>
        <td mat-cell *matCellDef="let v" class="text-center col-actions">
          <div class="action-button-group">
            <button mat-icon-button
                    color="primary"
                    (click)="onEdit(v)"
                    matTooltip="Edit Prime Contractor">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button
                    color="warn"
                    (click)="onDelete(v)"
                    matTooltip="Delete Prime Contractor">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <div *ngIf="data().length === 0" class="empty-dataset-fallback">
    <mat-icon class="fallback-icon">assignment_late</mat-icon>
    <p>No active ledger accounts or prime contractor listings found matching this profile workspace context.</p>
  </div>

</div>
