<mat-card class="file-browser-card">
  <mat-card-header>
    <mat-icon color="primary">folder</mat-icon>
    <mat-card-title>Project Cloud Files (S3)</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <mat-list>
      <mat-list-item *ngFor="let filename of files" class="file-row">
        <mat-icon matListItemIcon>insert_drive_file</mat-icon>
        <span matListItemTitle>{{ filename }}</span>
        <button mat-icon-button matListItemMeta (click)="viewFile(filename)">
          <mat-icon color="accent">visibility</mat-icon>
        </button>
      </mat-list-item>
    </mat-list>
  </mat-card-content>
</mat-card>
