<mat-card class="file-browser-card">
  <!-- Replaced Fixed Header with Action-enabled Header[cite: 5] -->
  <mat-card-header style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid #e0e0e0;">
    <div style="display: flex; align-items: center; gap: 10px;">
      <mat-icon color="primary">folder</mat-icon> <!--[cite: 5] -->
      <mat-card-title style="margin: 0;">Project Cloud Files (S3)</mat-card-title> <!--[cite: 5] -->
    </div>
    <div>
      <button (click)="createNewFolder()">
        <mat-icon>create_new_folder</mat-icon> Create Folder
      </button>

      <button mat-flat-button color="primary" [disabled]="isLoading" (click)="triggerFileUpload()">
        <mat-icon>upload_file</mat-icon> Upload File
      </button>
    </div>
  </mat-card-header>

  <!-- Virtual Directory Path Display Layer -->
  <div style="display: flex; align-items: center; padding: 0.5rem 1rem; background-color: #f5f5f5; border-radius: 4px; margin: 1rem;" *ngIf="pathHistory.length > 0">
    <button mat-button (click)="navigateToRoot()">Root</button>
    <span *ngFor="let folder of pathHistory; let i = index" style="display: inline-flex; align-items: center;">
      <mat-icon style="font-size: 18px; width: 18px; height: 18px; color: #888;">chevron_right</mat-icon>
      <button mat-button (click)="navigateBackTo(i)">{{ folder }}</button>
    </span>
  </div>

  <mat-progress-bar mode="indeterminate" *ngIf="isLoading"></mat-progress-bar>

  <mat-card-content> <!--[cite: 5] -->
    <!-- Fallback Content Framework -->
    <div style="text-align: center; padding: 2rem; color: #757575;" *ngIf="items.length === 0 && !isLoading">
      <mat-icon style="font-size: 40px; width: 40px; height: 40px; color: #bdbdbd;">folder_open</mat-icon>
      <p>This directory has no items inside yet.</p>
    </div>

    <!-- Active Structural Items Mapping Iterator[cite: 5] -->
    <mat-list *ngIf="items.length > 0"> <!--[cite: 5] -->
      <mat-list-item *ngFor="let item of items" class="file-row" (click)="onItemClick(item)" style="cursor: pointer;"> <!--[cite: 5] -->
        <!-- Changes asset row icon types depending on folder status[cite: 5] -->
        <mat-icon matListItemIcon [color]="item.isFolder ? 'primary' : ''">
          {{ item.isFolder ? 'folder' : 'insert_drive_file' }} <!--[cite: 5] -->
        </mat-icon>

        <span matListItemTitle>{{ item.name }}</span>

        <!-- Interactive Actions Configuration Controls Container[cite: 5] -->
        <div matListItemMeta style="display: flex; gap: 4px;"> <!--[cite: 5] -->
          <button mat-icon-button (click)="viewFile(item.fullName); $event.stopPropagation()" *ngIf="!item.isFolder"> <!--[cite: 5] -->
            <mat-icon color="accent">visibility</mat-icon> <!--[cite: 5] -->
          </button>
          <button mat-icon-button color="warn" (click)="deleteFile(item.fullName, $event)">
            <mat-icon>delete_outline</mat-icon>
          </button>
        </div>
      </mat-list-item> <!--[cite: 5] -->
    </mat-list> <!--[cite: 5] -->
  </mat-card-content> <!--[cite: 5] -->
</mat-card>

<!-- Hidden Upload Input Bridge Target -->
<input type="file" #fileInput style="display: none;" (change)="onFileSelected($event)">
